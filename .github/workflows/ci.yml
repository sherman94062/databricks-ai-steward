name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR/branch when new commits land.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest + lint + type + sast
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        # 3.12 is the project's `requires-python` floor; 3.14 matches dev.
        python-version: ["3.12", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,http]'

      - name: ruff (lint + import order)
        run: ruff check mcp_server/ tests/

      - name: mypy (type-check)
        run: mypy mcp_server/

      - name: bandit (security scan)
        # Treat MEDIUM+ as failures; LOW gets reported but doesn't fail.
        run: bandit -c pyproject.toml -r mcp_server/ --severity-level medium

      - name: pytest
        # Live-workspace probes need DATABRICKS_* secrets we don't have
        # in CI; the unit-test suite uses mocked clients and doesn't.
        env:
          MCP_AUDIT_DISABLE_STDERR: "1"
        run: pytest tests/ -v

  security:
    name: dependency CVE scan + SBOM + license check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project + dev deps (latest pip)
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,http]'

      - name: pip-audit (CVE scan against the lockfile)
        # Scans the pinned dependency set defined by requirements.lock
        # (which is what the production container installs). Fails on
        # any known vulnerability — bump the dep + regenerate the
        # lockfile before merge.
        run: pip-audit -r requirements.lock --strict

      - name: pip-licenses (no copyleft surprises)
        # Fails if anything in the runtime closure is GPL/LGPL/AGPL.
        # Dev-only LGPL deps (e.g. chardet via cyclonedx-bom) don't
        # ship in the production container, but a stricter check could
        # add `--ignore-packages chardet` if scope creeps.
        run: |
          pip-licenses \
            --fail-on='GNU General Public License (GPL);GNU General Public License v2 (GPLv2);GNU General Public License v3 (GPLv3);GNU Affero General Public License v3 or later (AGPLv3+);GNU Affero General Public License (AGPL)'

      - name: Generate SBOM (CycloneDX)
        # Uploaded as a build artifact so security review can pull it
        # directly from the run page without re-running anything.
        run: cyclonedx-py environment -o sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.json
          retention-days: 90

  container-scan:
    name: container CVE scan (trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test]

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t databricks-ai-steward:${{ github.sha }} .

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: databricks-ai-steward:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true
          # Scan both OS package CVEs and Python deps inside the
          # image. Misconfigurations are scanned via the Dockerfile
          # itself in a separate step below.
          scanners: vuln,secret

      - name: Trivy config (Dockerfile misconfigurations)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          exit-code: 1

  helm:
    name: helm lint + template
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0
      - name: helm lint
        run: helm lint deploy/helm/databricks-ai-steward
      - name: helm template (default values)
        run: helm template steward deploy/helm/databricks-ai-steward > /tmp/render-default.yaml
      - name: helm template (full overrides)
        # Exercises every conditional template — auth, ingress,
        # autoscaling, ServiceMonitor, log-shipper sidecar, per-tool
        # creds, end-user header.
        run: |
          cat > /tmp/values.yaml <<'EOF'
          secrets:
            databricks: { secretName: dbx-creds }
            bearer:     { secretName: steward-bearer }
            perTool:
              - tool: execute_sql_safe
                secretName: tool-sql
                tokenKey: token
          ingress:
            enabled: true
            hosts:
              - host: steward.example.com
                paths: [ { path: /, pathType: Prefix } ]
          config:
            trustEndUserHeader: "1"
            endUserHeader: X-Forwarded-User
            bearerTokenName: team-data
            prometheusEnabled: "1"
            otelExporterOtlpEndpoint: http://otel:4317
          networkPolicy:
            databricks: { host: workspace.cloud.databricks.com }
          autoscaling:    { enabled: true }
          serviceMonitor: { enabled: true }
          logShipper:
            enabled: true
            image: timberio/vector:0.34.0-distroless-static
            args: ["--config", "/etc/vector/vector.yaml"]
          EOF
          helm template steward deploy/helm/databricks-ai-steward -f /tmp/values.yaml > /tmp/render-full.yaml
      - name: Validate rendered manifests against k8s schemas
        # kubeconform is fast and offline — validates the rendered YAML
        # against the upstream Kubernetes JSON schemas. Catches typos
        # the helm linter doesn't (e.g. wrong fields, bad enum values).
        run: |
          curl -sSL -o /tmp/kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp
          /tmp/kubeconform -strict -summary -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            /tmp/render-default.yaml /tmp/render-full.yaml
