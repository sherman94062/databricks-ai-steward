# Local / single-host deployment of databricks-ai-steward.
#
# Usage:
#   1. Copy .env.example to .env at the repo root and fill in
#      DATABRICKS_HOST + DATABRICKS_TOKEN (and optionally
#      MCP_BEARER_TOKEN to require auth on the HTTP port).
#   2. From the repo root: docker compose -f deploy/docker-compose.yml up
#
# This is a non-k8s deployment. For k8s use deploy/helm/databricks-ai-steward.

services:
  steward:
    build:
      context: ..
      dockerfile: Dockerfile
    image: databricks-ai-steward:local
    container_name: databricks-ai-steward
    restart: unless-stopped
    ports:
      # Bind only to loopback by default. Change to "0.0.0.0:8765:8765"
      # AFTER setting MCP_BEARER_TOKEN — anyone reachable on 0.0.0.0
      # can call any tool otherwise.
      - "127.0.0.1:8765:8765"
    environment:
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8765"
      MCP_ALLOW_EXTERNAL: "1"
      MCP_LOG_LEVEL: warning
      MCP_AUDIT_LOG_PATH: /var/log/steward/audit.jsonl
      MCP_TOOL_TIMEOUT_S: "30"
      MCP_SQL_ROW_LIMIT: "100"
      MCP_SQL_HARD_ROW_LIMIT: "1000"
      MCP_SQL_WAIT_TIMEOUT_S: "25"
      # Workspace credentials — pulled from .env at repo root.
      DATABRICKS_HOST: ${DATABRICKS_HOST}
      DATABRICKS_TOKEN: ${DATABRICKS_TOKEN}
      # Optional: require Bearer auth on the HTTP port.
      MCP_BEARER_TOKEN: ${MCP_BEARER_TOKEN:-}
      MCP_BEARER_TOKEN_NAME: ${MCP_BEARER_TOKEN_NAME:-bearer-authenticated}
      # Optional: per-end-user identity from a verified upstream proxy.
      MCP_TRUST_END_USER_HEADER: ${MCP_TRUST_END_USER_HEADER:-}
      MCP_END_USER_HEADER: ${MCP_END_USER_HEADER:-X-End-User}
    env_file:
      - ../.env
    volumes:
      - audit-log:/var/log/steward
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8765/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  audit-log:
    driver: local
