[project]
name = "databricks-ai-steward"
version = "0.1.0"
description = "MCP server that lets AI agents interact with Databricks safely."
requires-python = ">=3.12"
dependencies = [
    "mcp>=1.2.0",
    "python-dotenv>=1.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["mcp_server"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
